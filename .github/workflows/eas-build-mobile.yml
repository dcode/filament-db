# Manual-dispatch EAS Build for the Expo mobile app (packages/mobile).
#
# Replaces the Xcode Cloud setup, which can't build this app: it's a managed
# Expo (Continuous Native Generation) project — `ios/` and `android/` are
# generated by `expo prebuild` and are NOT committed, so Xcode Cloud has no
# Xcode project to open. EAS Build generates the native project, installs
# Pods, and signs the app on Expo's build servers instead.
#
# PREREQUISITES (one-time, can't be done from this repo):
#   1. An Expo account + an EAS project linked to packages/mobile:
#        cd packages/mobile && npx eas-cli login && npx eas-cli init
#      `eas init` writes `extra.eas.projectId` into app.config.ts — commit it.
#   2. iOS signing set up on EAS (run one interactive build first so EAS can
#      create the distribution cert + provisioning profile):
#        npx eas-cli build -p ios --profile production
#      The App ID `com.filamentdb.scanner` needs the "NFC Tag Reading"
#      capability for an NFC (non-QR-only) build — a paid Apple Developer
#      account is required (a free Apple ID can only build the `preview-qr`
#      profile, which sets EXPO_PUBLIC_ENABLE_NFC=0).
#   3. A repository secret `EXPO_TOKEN` (Expo → Account → Access tokens) so
#      this workflow can authenticate non-interactively.
#
# This is workflow_dispatch only (no push trigger) so it never spends EAS
# build credits unless you explicitly run it.
name: EAS Build (mobile)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        type: choice
        default: ios
        options: [ios, android, all]
      profile:
        description: "eas.json build profile"
        type: choice
        default: production
        options: [preview, preview-qr, production]

jobs:
  build:
    name: eas build (${{ inputs.platform }} / ${{ inputs.profile }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/mobile/package-lock.json

      - name: Require EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN repository secret is not set. Add it under"
            echo "::error::Settings → Secrets and variables → Actions (see this workflow's header)."
            exit 1
          fi

      - run: npm ci

      - uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # --no-wait queues the build on EAS and returns immediately, so the
      # GitHub runner doesn't sit idle (and burn Actions minutes) waiting for
      # the EAS build queue. Track progress at https://expo.dev.
      - name: Queue EAS build
        run: |
          eas build \
            --non-interactive \
            --no-wait \
            --platform "${{ inputs.platform }}" \
            --profile "${{ inputs.profile }}"
