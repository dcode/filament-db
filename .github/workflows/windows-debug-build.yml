name: Windows debug build

# Builds an UNSIGNED Windows x64 installer for ad-hoc testing (e.g. verifying
# the OpenPrintTag browse temp-dir cleanup on a real Windows host) and uploads
# it as a workflow artifact — it does NOT publish a release.
#
# Triggers on push to the debug branch so it runs without a v* tag, plus
# workflow_dispatch (available once this file is on the default branch) so it
# can be re-run against any ref on demand. Safe to delete when no longer needed.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or ref to build
        required: false
        default: claude/openprinttag-extract-timeout-sjhhny
  push:
    branches:
      - claude/openprinttag-browse-hang-fix
      - claude/openprinttag-extract-timeout-sjhhny

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js and compile Electron
        run: |
          npm run build
          npm run electron:fixlinks
          npm run electron:compile

      # NFC is NOT a blocker on a Windows runner: electron-rebuild compiles
      # @pokusew/pcsclite against WinSCard (in the Windows SDK on the runner),
      # and the app boots fine with no reader attached — so it stays in this
      # debug build rather than being risky-stripped.
      - name: Rebuild native module and package (Windows x64, unsigned)
        run: |
          npm run electron:rebuild
          npx electron-builder --config electron-builder.yml --win --x64 --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: filamentdb-windows-x64
          path: |
            dist-electron/*.exe
            dist-electron/*.zip
          if-no-files-found: error
