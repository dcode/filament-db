appId: com.filamentdb.app
productName: Filament DB
copyright: Copyright 2026
artifactName: "FilamentDB-${version}-${os}-${arch}.${ext}"

directories:
  output: dist-electron
  buildResources: assets

icon: assets/icon.png

# asar disabled — v1.14.2 attempted asar:true to fix the slow Windows
# install (GH #176 install stall) but the embedded server's utility
# process exited with code 1 during module load. Likely cause: sharp's
# bundled .node binary, built for Node's ABI by `npm install`, fails to
# load in Electron's Node runtime when paired with `npmRebuild: false`,
# OR a path-resolution lookup escapes the asar shim. Either way, asar
# needs more investigation before we attempt it again — the server
# stdio capture added in electron/main.ts will log the actual exception
# next time. Slow install returns until we have a working asar config;
# that's preferable to an app that doesn't start.
asar: false
npmRebuild: false

files:
  - electron-dist/**/*
  - standalone/**/*
  # Turbopack places hashed external modules in .next/node_modules/ (e.g.
  # mongoose-8b99e611e7552af3). electron-builder auto-inserts
  # "!**/node_modules/**" when it sees node_modules include patterns, which
  # strips this directory.  Re-include it explicitly.
  - standalone/.next/node_modules/**/*
  - package.json
  - node_modules/nfc-pcsc/**/*
  - node_modules/@pokusew/pcsclite/**/*
  # debug + ms: small logging deps pulled in transitively by bundled
  # native / DB modules; included explicitly so their requires resolve in
  # the packaged app. (GH #588: the Brother PT-P710BT label printer no
  # longer uses serialport — it prints through the OS print system via
  # electron/label-printer.ts, so serialport + its native binding loaders
  # were dropped from the bundle.)
  - node_modules/debug/**/*
  - node_modules/ms/**/*
  - node_modules/mongodb/**/*
  - node_modules/bson/**/*
  - node_modules/mongodb-connection-string-url/**/*
  - node_modules/whatwg-url/**/*
  - node_modules/tr46/**/*
  - node_modules/webidl-conversions/**/*
  - node_modules/socks/**/*
  - node_modules/smart-buffer/**/*
  - node_modules/sparse-bitfield/**/*
  - node_modules/memory-pager/**/*
  - node_modules/ip-address/**/*
  - node_modules/mongodb-memory-server-core/**/*
  - "!src"
  - "!tests"
  - "!scripts"
  - "!electron"
  - "!.next"
  - "!.github"
  - "!docs"
  - "!coverage"

# Ship the AGPL license text inside the packaged app (Resources/LICENSE) so
# distributed Electron builds convey the license that package.json declares,
# per AGPL §1.
extraResources:
  - LICENSE

mac:
  category: public.app-category.utilities
  # Code signing + notarization. Signing only happens when the release workflow
  # provides a Developer ID cert (CSC_LINK); otherwise electron-builder builds
  # an UNSIGNED dmg as before (the workflow sets CSC_IDENTITY_AUTO_DISCOVERY=
  # false when the signing secrets are absent). Hardened Runtime is required for
  # notarization; the entitlements below let V8 JIT and let the signed app load
  # the @pokusew/pcsclite native module. Notarization itself is enabled per-build
  # via the CLI flag `--config.mac.notarize=true`, which the workflow appends
  # ONLY when the Apple notarization secrets are present.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  # Do NOT hardcode arch here. The release workflow passes --arm64 or --x64
  # per matrix job, and electron-builder treats CLI arch flags as additive
  # when a target has an arch list, so both archs would be built per job.
  # Leaving arch unset means the CLI flag alone determines what gets built.
  #
  # `zip` is REQUIRED for auto-update: electron-updater's macOS updater
  # (Squirrel.Mac) downloads a .zip of the app and throws "ZIP file not
  # provided" when the release ships only a .dmg. The .dmg stays for manual
  # download. The global artifactName embeds ${arch}, so the zips land as
  # FilamentDB-<version>-mac-arm64.zip / -mac-x64.zip — the "arm64" in the name
  # is what electron-updater's MacUpdater filters on to install the native arch.
  target:
    - dmg
    - zip

win:
  # Do NOT hardcode arch here (mirrors the mac config above). Each CI matrix
  # job rebuilds pcsclite for exactly one arch and then invokes electron-
  # builder with the matching --x64 or --arm64 flag. Listing both arches
  # under `target.arch[]` would make electron-builder build BOTH per-arch
  # installers PLUS a universal combined one in every Windows CI job —
  # which (a) ships ~398 MB of duplicated content as the no-arch
  # `windows-setup.exe` and (b) silently smuggles the wrong pcsclite.node
  # into the off-arch installer (the arm64 CI job has only the arm64
  # native module, so its windows-x64-setup.exe is broken — and vice
  # versa). Leaving arch unset means the CLI flag alone scopes the build.
  target:
    - target: nsis
    - target: zip

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: "FilamentDB-${version}-windows-${arch}-setup.${ext}"

compression: normal

linux:
  category: Utility
  target:
    - target: AppImage
    - target: deb

# electron-updater reads from this publish target at runtime. The CI workflow
# already uploads latest-*.yml metadata files to the GitHub release, which is
# what the updater polls. No token needed at install time — the check is an
# unauthenticated GET against the releases API.
publish:
  - provider: github
    owner: hyiger
    repo: filament-db
